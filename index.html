<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاني الكلمات
    <style>
        /* تعريف الألوان والمتغيرات */
        :root {
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --text-color: #333;
            --primary-color: #4a90e2;
            --accent-color: #50c878;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
            --card-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --primary-color: #3a7bd5;
            --card-bg: #3d3d3d;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--container-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.5rem; margin: 0; }

        /* زر الوضع الليلي */
        .theme-toggle {
            background: none;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* حقل البحث */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
            background: var(--card-bg);
            color: var(--text-color);
        }

        button#searchBtn {
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button#searchBtn:hover { opacity: 0.8; }

        /* قالب البطاقة */
        #resultArea { margin-top: 20px; min-height: 100px; }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: right;
            border-right: 5px solid var(--primary-color);
            animation: fadeIn 0.5s ease;
        }

        .card h2 { margin-top: 0; color: var(--primary-color); }
        .card p { line-height: 1.6; margin: 10px 0; }
        .example-label { font-weight: bold; color: var(--accent-color); }

        .error { color: #e74c3c; font-weight: bold; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>قاموسي الشخصي</h1>
        <button class="theme-toggle" id="themeBtn">الوضع الليلي</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="اكتب الكلمة هنا...">
        <button id="searchBtn">بحث</button>
    </div>

    <div id="resultArea">
        </div>
</div>

<script>
    // رابط ورقة بيانات جوجل (محول تلقائياً لـ CSV)
    const sheetId = '1DLTYDgoPf_OPMi-vjp6Fx7JJN4_PNdRrBT8vMICrc1Q';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultArea = document.getElementById('resultArea');
    const themeBtn = document.getElementById('themeBtn');

    // تبديل الوضع الليلي
    themeBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'light');
            themeBtn.innerText = 'الوضع الليلي';
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeBtn.innerText = 'الوضع النهاري';
        }
    });

    // دالة البحث
    async function searchWord() {
        const query = searchInput.value.trim().toLowerCase();
        if (!query) return;

        resultArea.innerHTML = 'جاري البحث...';

        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            
            // تحويل CSV إلى مصفوفة (معالجة بسيطة)
            const rows = data.split('\n').map(row => row.split(','));
            
            // البحث عن الكلمة (بافتراض الكلمة في العمود الأول)
            const foundRow = rows.find(row => row[0].trim().toLowerCase() === query);

            if (foundRow) {
                displayResult(foundRow);
            } else {
                resultArea.innerHTML = '<p class="error">الكلمة غير موجودة في قاعدتنا</p>';
            }
        } catch (error) {
            resultArea.innerHTML = '<p class="error">حدث خطأ في الاتصال بالبيانات</p>';
            console.error(error);
        }
    }

    function displayResult(data) {
        // data[0] = الكلمة، data[1] = الجملة الأولى، data[2] = الجملة الثانية
        resultArea.innerHTML = `
            <div class="card">
                <h2>${data[0]}</h2>
                <p><span class="example-label">المعنى/الجملة 1:</span> ${data[1] || '---'}</p>
                <p><span class="example-label">الجملة 2:</span> ${data[2] || '---'}</p>
            </div>
        `;
    }

    searchBtn.addEventListener('click', searchWord);

    // البحث عند الضغط على Enter
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchWord();
    });
</script>

</body>
  </html>
