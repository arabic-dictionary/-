<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قاموس البحث الذكي</title>
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-word: #2ecc71;
            --text-labels: #27ae60;
            --text-content: #1a1a1a;
            --input-bg: #ffffff;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
            --footer-color: #94a3b8;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-word: #2ecc71;
            --text-labels: #4ade80;
            --text-content: #f8fafc;
            --input-bg: #334155;
            --shadow: 0 10px 30px rgba(0,0,0,0.4);
            --footer-color: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-content);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
        }

        .app-container {
            width: 90%;
            max-width: 600px;
            padding: 50px 0;
            flex-grow: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* حاوية البحث */
        .search-container {
            position: relative;
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }

        input#wordInput {
            flex: 1;
            padding: 16px 20px;
            border-radius: 14px;
            border: 2px solid transparent;
            font-size: 1.1rem;
            background: var(--input-bg);
            color: var(--text-content);
            outline: none;
            box-shadow: var(--shadow);
            transition: 0.3s;
        }

        input#wordInput:focus { border-color: var(--text-word); }

        button#searchBtn {
            padding: 0 25px;
            border-radius: 14px;
            border: none;
            background: var(--text-word);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* قائمة الاقتراحات والسجل */
        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            left: 0;
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            z-index: 1000;
            margin-top: 8px;
            display: none;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .dropdown-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dropdown-item:hover { background: rgba(46, 204, 113, 0.1); }
        .dropdown-item.history-item::before { content: "🕒"; font-size: 0.9rem; }
        .dropdown-item.suggest-item::before { content: "🔍"; font-size: 0.9rem; }

        /* نتائج البحث */
        .result-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-top: 30px;
            border-right: 8px solid var(--text-word);
            animation: slideUp 0.4s ease;
        }

        .result-card h2 { color: var(--text-word); font-size: 2.2rem; margin: 0 0 20px 0; }
        .sentence-box { margin-bottom: 20px; }
        .label { display: block; color: var(--text-labels); font-weight: bold; margin-bottom: 5px; }
        .content { font-size: 1.3rem; line-height: 1.6; }

        /* Spinner */
        .loader {
            display: none;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--text-word);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid #ddd;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-content);
        }

        footer { padding: 20px; font-size: 0.8rem; color: var(--footer-color); text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>معاني الكلمات</h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">الوضع الليلي</button>
    </div>

    <div class="search-container">
        <input type="text" id="wordInput" placeholder="ابحث عن كلمة..." autocomplete="off">
        <button id="searchBtn" onclick="handleSearch()">بحث</button>
        <div id="dropdownMenu" class="dropdown-menu"></div>
    </div>

    <div id="loader" class="loader"></div>
    <div id="resultArea"></div>
</div>

<footer>
    سياسة الخصوصية: التطبيق يحفظ سجل بحثك محلياً على جهازك فقط ولا يجمع بيانات شخصية.
</footer>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwRF6ZycN-hWpqWu2LW3LaU3Bgf7mQhJeORX6xKiXJ0EKInKU6weTgfZYrANBDt6Lnc/exec";
    const input = document.getElementById('wordInput');
    const dropdown = document.getElementById('dropdownMenu');
    const resultArea = document.getElementById('resultArea');
    const loader = document.getElementById('loader');

    // --- سجل البحث (LocalStorage) ---
    function getHistory() {
        return JSON.parse(localStorage.getItem('searchHistory') || '[]');
    }

    function addToHistory(word) {
        let history = getHistory().filter(w => w !== word);
        history.unshift(word);
        localStorage.setItem('searchHistory', JSON.stringify(history.slice(0, 7)));
    }

    // --- عرض القائمة المنسدلة ---
    input.addEventListener('focus', () => {
        if (!input.value.trim()) showHistory();
    });

    input.addEventListener('input', async () => {
        const val = input.value.trim();
        if (val.length < 2) {
            dropdown.style.display = val.length === 0 ? 'block' : 'none';
            if (val.length === 0) showHistory();
            return;
        }
        
        // جلب الاقتراحات من API
        try {
            const res = await fetch(`${API_URL}?suggest=${encodeURIComponent(val)}`);
            const suggestions = await res.json();
            renderDropdown(suggestions, 'suggest-item');
        } catch (e) { console.error("Suggest error"); }
    });

    function showHistory() {
        const history = getHistory();
        if (history.length > 0) renderDropdown(history, 'history-item');
        else dropdown.style.display = 'none';
    }

    function renderDropdown(items, className) {
        dropdown.innerHTML = '';
        if (items.length === 0) { dropdown.style.display = 'none'; return; }
        
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = `dropdown-item ${className}`;
            div.textContent = item;
            div.onclick = () => {
                input.value = item;
                dropdown.style.display = 'none';
                handleSearch();
            };
            dropdown.appendChild(div);
        });
        dropdown.style.display = 'block';
    }

    // --- عملية البحث الكاملة ---
    async function handleSearch() {
        const query = input.value.trim();
        if (!query) return;

        dropdown.style.display = 'none';
        resultArea.innerHTML = '';
        loader.style.display = 'block';

        try {
            const res = await fetch(`${API_URL}?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            loader.style.display = 'none';

            if (data.found) {
                addToHistory(data.word);
                resultArea.innerHTML = `
                    <div class="result-card">
                        <h2>${data.word}</h2>
                        <div class="sentence-box">
                            <span class="label">الجملة الأولى:</span>
                            <span class="content">${data.sentence1 || ''}</span>
                        </div>
                        <div class="sentence-box">
                            <span class="label">الجملة الثانية:</span>
                            <span class="content">${data.sentence2 || ''}</span>
                        </div>
                    </div>
                `;
            } else {
                resultArea.innerHTML = `<p style="text-align:center; opacity:0.6;">الكلمة غير موجودة</p>`;
            }
        } catch (e) {
            loader.style.display = 'none';
            resultArea.innerHTML = `<p style="color:red; text-align:center;">خطأ في الاتصال</p>`;
        }
    }

    // إغلاق القائمة عند الضغط خارجها
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-container')) dropdown.style.display = 'none';
    });

    function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeBtn').innerText = isDark ? "الوضع الليلي" : "الوضع النهاري";
    }

    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearch(); });
</script>

</body>
</html>
