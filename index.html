<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاني الكلمات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #ffffff; 
            --bg-card: #ffffff;
            --text-word: #2ecc71;
            --text-labels: #27ae60;
            --text-content: #1a1a1a;
            --input-bg: #f8fafc; 
            --input-border: #e2e8f0; 
            --btn-blue: #3b82f6; 
            --theme-btn-text: #000000;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-word: #2ecc71;
            --text-labels: #4ade80;
            --text-content: #f8fafc;
            --input-bg: #ffffff; 
            --input-border: transparent;
            --theme-btn-text: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* لضمان بقاء العناصر في الأسفل */
        html, body { height: 100%; margin: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-content);
            display: flex;
            flex-direction: column;
            align-items: center;
            direction: rtl;
            transition: background 0.3s;
        }

        .app-container {
            width: 95%;
            max-width: 600px;
            padding: 40px 0;
            flex: 1 0 auto; /* هذا يسمح للمحتوى بالتمدد */
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        #themeBtn {
            background: transparent;
            border: 1px solid var(--theme-btn-text);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: var(--theme-btn-text);
        }

        .search-container {
            position: relative;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input#wordInput {
            flex: 1;
            padding: 16px 20px;
            border-radius: 14px;
            border: 2px solid var(--input-border);
            background: var(--input-bg);
            color: #000;
            outline: none;
            box-shadow: var(--shadow);
        }

        #searchBtn {
            padding: 0 25px;
            border-radius: 14px;
            border: none;
            background: var(--btn-blue);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- حركة حرف الضاد بخط Tajawal --- */
        .loader-wrapper {
            display: none;
            text-align: center;
            margin: 30px auto;
        }

        .dad-loader {
            font-family: 'Tajawal', sans-serif; /* تطبيق الخط هنا */
            font-size: 80px;
            color: var(--text-word);
            display: inline-block;
            animation: pulseDad 1.5s ease-in-out infinite;
            font-weight: 700;
        }

        @keyframes pulseDad {
            0% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }
            100% { transform: scale(1); opacity: 0.4; }
        }

        /* --- تنسيق البطاقة --- */
        .result-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-top: 20px;
            border-right: 10px solid var(--text-word);
            animation: slideUp 0.4s ease;
        }

        .result-card h2 { color: var(--text-word); font-size: 2.2rem; margin: 0 0 20px 0; }
        .label { display: block; color: var(--text-labels); font-weight: bold; margin-bottom: 8px; }
        .content { font-size: 1.4rem; line-height: 1.7; margin-bottom: 25px; display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- قسم الاقتراحات - مثبت في الأسفل --- */
        .footer-suggest { 
            flex-shrink: 0; 
            padding: 40px 0; 
            text-align: center; 
            width: 100%;
        }

        .suggest-link { color: var(--btn-blue); text-decoration: underline; cursor: pointer; font-weight: bold; }
        
        .hidden-panel {
            display: none;
            margin: 15px auto 0;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 15px;
            box-shadow: var(--shadow);
            border: 1px solid var(--input-border);
            position: relative;
            max-width: 450px;
        }
        
        .close-suggest { position: absolute; top: 5px; left: 10px; cursor: pointer; color: #ff4d4d; font-weight: bold; font-size: 1.2rem; }
        .suggest-box { display: flex; gap: 8px; margin-top: 10px; }
        .suggest-input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--input-border); outline: none; background: var(--input-bg); color: #000; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>معاني الكلمات</h1>
        <button onclick="toggleTheme()" id="themeBtn">الوضع المظلم</button>
    </div>

    <div class="search-container">
        <input type="text" id="wordInput" placeholder="أكتب كلمة..." autocomplete="off" onkeydown="if(event.key==='Enter') handleSearch()">
        <button id="searchBtn" onclick="handleSearch()">بحث</button>
    </div>

    <div id="loader" class="loader-wrapper">
        <div class="dad-loader">ض</div>
        <p style="font-size: 0.9rem; margin-top: 5px; opacity: 0.6; font-family: 'Tajawal', sans-serif;">جاري البحث عن المعنى...</p>
    </div>

    <div id="resultArea"></div>
</div>

<div class="footer-suggest" id="footerArea">
    <span class="suggest-link" id="toggleLink" onclick="showSuggestPanel()">هل لديك كلمة جديدة؟</span>
    
    <div class="hidden-panel" id="suggestPanel">
        <span class="close-suggest" onclick="hideSuggestPanel()">✕</span>
        <div class="suggest-box">
            <input type="text" id="newWordInput" class="suggest-input" placeholder="اكتب الكلمة هنا...">
            <button onclick="sendNewWord()" style="background: var(--btn-blue); color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-weight: bold;">إرسال</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwRF6ZycN-hWpqWu2LW3LaU3Bgf7mQhJeORX6xKiXJ0EKInKU6weTgfZYrANBDt6Lnc/exec";

    function applySavedTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeBtn').innerText = savedTheme === 'dark' ? "الوضع الفاتح" : "الوضع المظلم";
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        document.getElementById('themeBtn').innerText = newTheme === 'dark' ? "الوضع الفاتح" : "الوضع المظلم";
    }

    function showSuggestPanel() {
        document.getElementById('toggleLink').style.display = 'none';
        document.getElementById('suggestPanel').style.display = 'block';
    }

    function hideSuggestPanel() {
        document.getElementById('toggleLink').style.display = 'inline';
        document.getElementById('suggestPanel').style.display = 'none';
    }

    async function handleSearch() {
        const input = document.getElementById('wordInput');
        const resArea = document.getElementById('resultArea');
        const loader = document.getElementById('loader');
        const query = input.value.trim();

        if (!query) return;
        
        resArea.innerHTML = '';
        loader.style.display = 'block';

        try {
            const res = await fetch(`${API_URL}?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            loader.style.display = 'none';

            if (data.found) {
                resArea.innerHTML = `
                    <div class="result-card">
                        <h2>${data.word}</h2>
                        <span class="label">الجملة الأولى:</span>
                        <span class="content">${data.sentence1}</span>
                        <span class="label">الجملة الثانية:</span>
                        <span class="content">${data.sentence2}</span>
                    </div>`;
            } else {
                resArea.innerHTML = '<p style="text-align:center; opacity:0.6; margin-top:20px;">الكلمة غير موجودة حالياً.</p>';
            }
        } catch (e) {
            loader.style.display = 'none';
            resArea.innerHTML = '<p style="color:red; text-align:center; margin-top:20px;">خطأ في الاتصال بالقاعدة.</p>';
        }
    }

    async function sendNewWord() {
        const wordInput = document.getElementById('newWordInput');
        const word = wordInput.value.trim();
        if (!word) return;
        
        const formURL = "https://docs.google.com/forms/d/e/YOUR_FORM_ID/formResponse";
        const entryID = "entry.123456789";

        const formData = new FormData();
        formData.append(entryID, word);

        fetch(formURL, { method: "POST", mode: "no-cors", body: formData });
        
        document.getElementById('footerArea').innerHTML = `
            <div style="color: var(--text-labels); font-weight: bold; padding: 20px; animation: slideUp 0.5s;">
                شكراً لك على مساعدة في تطوير موقعنا. ❤️
            </div>`;
    }

    applySavedTheme();
</script>
</body>
</html>
