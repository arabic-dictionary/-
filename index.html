<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاني الكلمات - النسخة النهائية</title>
    <style>
        :root {
            /* الوضع النهاري */
            --bg-body: #f4f7f9;
            --bg-card: #ffffff;
            --text-word: #2ecc71;    /* الكلمة الأساسية - أخضر */
            --text-labels: #27ae60;  /* العناوين - أخضر داكن قليلاً */
            --text-content: #000000; /* محتوى الجمل - أسود */
            --input-bg: #ffffff;
            --shadow: 0 8px 30px rgba(0,0,0,0.05);
            --footer-color: #999;
        }

        [data-theme="dark"] {
            /* الوضع الليلي */
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-word: #2ecc71;    /* الكلمة الأساسية - أخضر مشرق */
            --text-labels: #2ecc71;  /* العناوين - أخضر */
            --text-content: #ffffff; /* محتوى الجمل - أبيض */
            --input-bg: #2d2d2d;
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
            --footer-color: #666;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-content);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: 0.3s;
        }

        .app-container {
            width: 90%;
            max-width: 600px;
            padding: 40px 0;
            flex-grow: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* تنسيق البحث: الخانة والزر على سطر واحد */
        .search-wrapper {
            position: relative;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 1.1rem;
            background: var(--input-bg);
            color: var(--text-content);
            outline: none;
            box-shadow: var(--shadow);
        }

        button#searchBtn {
            padding: 0 25px;
            border-radius: 12px;
            border: none;
            background: var(--text-word);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }

        /* قائمة الاقتراحات */
        #suggestionsList {
            position: absolute;
            top: 100%;
            right: 0;
            left: 110px; /* لتجنب تغطية زر البحث */
            background: var(--bg-card);
            border-radius: 10px;
            box-shadow: var(--shadow);
            z-index: 100;
            display: none;
            border: 1px solid #eee;
        }

        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
        }

        .suggestion-item:hover { background: #f9f9f9; color: var(--text-word); }

        /* تنسيق بطاقة النتيجة */
        .result-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 18px;
            box-shadow: var(--shadow);
            margin-top: 20px;
            border-right: 6px solid var(--text-word);
        }

        .result-card h2 {
            color: var(--text-word);
            font-size: 2.2rem;
            margin: 0 0 25px 0;
        }

        /* الجمل تحت بعضها (Vertical Stack) */
        .sentence-group {
            margin-bottom: 20px;
        }

        .label {
            display: block; /* لجعل العنوان في سطر منفصل */
            color: var(--text-labels);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .content {
            display: block; /* لجعل النص في سطر منفصل تحت العنوان */
            font-size: 1.3rem;
            line-height: 1.6;
            color: var(--text-content);
        }

        .theme-btn {
            background: var(--bg-card);
            border: 1px solid #ddd;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-content);
        }

        /* تذييل الصفحة (Footer) */
        footer {
            padding: 20px;
            font-size: 0.8rem;
            color: var(--footer-color);
            text-align: center;
            width: 100%;
        }

        @media (max-width: 500px) {
            #suggestionsList { left: 0; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>معاني الكلمات</h1>
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">الوضع الليلي</button>
    </div>

    <div class="search-wrapper">
        <input type="text" id="wordInput" placeholder="ابحث عن كلمة..." autocomplete="off">
        <button id="searchBtn" onclick="performSearch()">بحث</button>
        <div id="suggestionsList"></div>
    </div>

    <div id="resultArea"></div>
</div>

<footer>
    سياسة الخصوصية: هذا التطبيق لا يقوم بجمع أي بيانات شخصية من المستخدمين، ويستخدم Google Sheets فقط لعرض المحتوى.
</footer>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/1DLTYDgoPf_OPMi-vjp6Fx7JJN4_PNdRrBT8vMICrc1Q/gviz/tq?tqx=out:csv";
    let wordsData = [];

    // جلب البيانات للاقتراحات
    async function init() {
        try {
            const response = await fetch(sheetUrl);
            const text = await response.text();
            wordsData = text.split('\n').map(row => 
                row.split(',').map(cell => cell.replace(/"/g, '').trim())
            ).filter(row => row[0]);
        } catch (e) { console.error("Error loading data"); }
    }

    const input = document.getElementById('wordInput');
    const suggestionsList = document.getElementById('suggestionsList');

    // منطق الاقتراحات
    input.addEventListener('input', () => {
        const val = input.value.trim().toLowerCase();
        suggestionsList.innerHTML = '';
        if (!val) { suggestionsList.style.display = 'none'; return; }

        const matches = wordsData.filter(r => r[0].toLowerCase().startsWith(val)).slice(0, 5);
        if (matches.length > 0) {
            matches.forEach(match => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.textContent = match[0];
                div.onclick = () => {
                    input.value = match[0];
                    suggestionsList.style.display = 'none';
                    performSearch();
                };
                suggestionsList.appendChild(div);
            });
            suggestionsList.style.display = 'block';
        } else { suggestionsList.style.display = 'none'; }
    });

    // تنفيذ البحث
    function performSearch() {
        const query = input.value.trim().toLowerCase();
        const resultArea = document.getElementById('resultArea');
        if (!query) return;

        const found = wordsData.find(r => r[0].toLowerCase() === query);
        if (found) {
            resultArea.innerHTML = `
                <div class="result-card">
                    <h2>${found[0]}</h2>
                    <div class="sentence-group">
                        <span class="label">الجملة الأولى:</span>
                        <span class="content">${found[1] || ''}</span>
                    </div>
                    <div class="sentence-group">
                        <span class="label">الجملة الثانية:</span>
                        <span class="content">${found[2] || ''}</span>
                    </div>
                </div>
            `;
        } else {
            resultArea.innerHTML = "<p style='text-align:center; opacity:0.6;'>الكلمة غير موجودة</p>";
        }
    }

    // تبديل الثيم
    function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeBtn').innerText = isDark ? "الوضع الليلي" : "الوضع النهاري";
    }

    document.addEventListener('click', (e) => { if (e.target !== input) suggestionsList.style.display = 'none'; });
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
    
    init();
</script>

</body>
</html>
