<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاني الكلمات</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --container-bg: #ffffff;
            --text-color: #1e293b;
            --primary-color: #22c55e; /* أخضر فاتح للكلمة */
            --secondary-color: #3b82f6; /* أزرق مشرق للجمل */
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
            --card-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f1f5f9;
            --primary-color: #4ade80;
            --secondary-color: #60a5fa;
            --card-bg: #334155;
            --shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
        }

        .container {
            width: 90%;
            max-width: 550px;
            background: var(--container-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 { font-size: 1.8rem; margin: 0; color: var(--text-color); }

        .theme-toggle {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1.2rem;
            background: var(--card-bg);
            color: var(--text-color);
            outline: none;
        }

        input:focus { border-color: var(--secondary-color); }

        button#searchBtn {
            padding: 0 25px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
        }

        #resultArea { margin-top: 1.5rem; }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            text-align: right;
            border-right: 6px solid var(--primary-color);
            animation: fadeIn 0.3s ease-in-out;
        }

        .card h2 { 
            margin: 0 0 15px 0; 
            color: var(--primary-color); 
            font-size: 2.2rem; 
            font-weight: 800;
        }

        .card p { 
            margin: 10px 0; 
            font-size: 1.4rem; 
            color: var(--secondary-color); 
            line-height: 1.6;
            font-weight: 500;
        }

        .status-msg { font-size: 1.1rem; color: #94a3b8; text-align: center; }
        .error { color: #ef4444; font-weight: bold; text-align: center; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 500px) {
            .search-box { flex-direction: column; }
            button#searchBtn { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>معاني الكلمات</h1>
        <button class="theme-toggle" id="themeBtn">الوضع الليلي</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="اكتب الكلمة هنا...">
        <button id="searchBtn">بحث</button>
    </div>

    <div id="resultArea">
        </div>
</div>

<script>
    // الرابط المباشر للملف
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/1DLTYDgoPf_OPMi-vjp6Fx7JJN4_PNdRrBT8vMICrc1Q/export?format=csv';

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultArea = document.getElementById('resultArea');
    const themeBtn = document.getElementById('themeBtn');

    // تبديل الوضع الليلي
    themeBtn.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        themeBtn.innerText = isDark ? 'الوضع الليلي' : 'الوضع النهاري';
    });

    // وظيفة معالجة نصوص الـ CSV المعقدة
    function parseCSV(text) {
        const rows = [];
        const lines = text.split(/\r?\n/);
        for (let line of lines) {
            // تقسيم السطر مع مراعاة النصوص التي قد تحتوي على فواصل بداخلها
            const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            rows.push(cols.map(c => c.replace(/^"|"$/g, '').trim()));
        }
        return rows;
    }

    async function doSearch() {
        const query = searchInput.value.trim().toLowerCase();
        if (!query) return;

        resultArea.innerHTML = '<p class="status-msg">جاري البحث...</p>';

        try {
            const response = await fetch(sheetUrl);
            if (!response.ok) throw new Error();
            
            const rawData = await response.text();
            const dataRows = parseCSV(rawData);
            
            // البحث في العمود الأول
            const match = dataRows.find(r => r[0] && r[0].toLowerCase() === query);

            if (match) {
                resultArea.innerHTML = `
                    <div class="card">
                        <h2>${match[0]}</h2>
                        <p>${match[1] || ''}</p>
                        <p>${match[2] || ''}</p>
                    </div>
                `;
            } else {
                resultArea.innerHTML = '<p class="error">الكلمة غير موجودة في قاعدتنا</p>';
            }
        } catch (err) {
            resultArea.innerHTML = '<p class="error">خطأ: تأكد من أن ملف Google Sheet متاح للجميع (Public)</p>';
        }
    }

    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') doSearch(); });
</script>

</body>
</html>
