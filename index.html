<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاني الكلمات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #ffffff; 
            --bg-card: #ffffff;
            --text-word: #2ecc71;
            --text-labels: #27ae60;
            --text-content: #1a1a1a;
            --input-bg: #f8fafc; 
            --input-border: #e2e8f0; 
            --btn-green: #2ecc71;
            --theme-btn-border: #000000;
            --theme-btn-text: #000000;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-word: #2ecc71;
            --text-labels: #4ade80;
            --text-content: #f8fafc;
            --input-bg: #334155; 
            --input-border: #475569;
            --theme-btn-border: #ffffff;
            --theme-btn-text: #ffffff;
            --shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* لضمان بقاء التذييل في الأسفل وظهوره فوراً */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-content);
            display: flex;
            flex-direction: column;
            align-items: center;
            direction: rtl;
            transition: background 0.3s;
        }

        .app-container {
            width: 90%;
            max-width: 650px;
            padding-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1 0 auto; /* هذا يسمح للحاوية بالنمو ودفع التذييل للأسفل */
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%; 
            margin-bottom: 20px;
        }

        .header h1 { font-size: 2.2rem; margin: 0; }

        /* زر الأوضاع: كبسولة شفافة في أقصى اليسار */
        #themeBtn {
            background: transparent;
            border: 1px solid var(--theme-btn-border);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: var(--theme-btn-text);
        }

        /* شريط البحث: مصغر ومنتصف ومزاح للأسفل قليلاً */
        .search-container {
            display: flex;
            gap: 10px;
            margin-top: 50px; /* المسافة التي طلبتها لتنزيل الشريط */
            margin-bottom: 30px;
            height: 50px;
            width: 100%;
            max-width: 400px; 
            align-items: stretch;
        }

        input#wordInput {
            flex: 1;
            padding: 0 15px;
            border-radius: 12px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-content);
            outline: none;
            box-shadow: var(--shadow);
            font-size: 1rem;
        }

        #searchBtn {
            padding: 0 25px;
            border-radius: 12px;
            border: none;
            background: var(--btn-green);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        /* اللودر والنتائج */
        .loader-wrapper { display: none; text-align: center; margin: 20px auto; }
        .dad-loader { font-family: 'Tajawal', sans-serif; font-size: 70px; color: var(--text-word); animation: pulseDad 1.5s infinite; font-weight: 700; }
        @keyframes pulseDad { 0%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.1); opacity: 1; } }

        .result-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            box-sizing: border-box;
            border-right: 10px solid var(--text-word);
            margin-bottom: 30px;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- التذييل: في أسفل الموقع وظاهر للمستخدم --- */
        .footer-suggest { 
            flex-shrink: 0; /* يمنع التذييل من التقلص */
            padding: 30px 0; 
            text-align: center; 
            width: 100%; 
        }
        .suggest-link { color: #3b82f6; text-decoration: underline; cursor: pointer; font-weight: bold; font-size: 0.95rem; }
        
        .hidden-panel {
            display: none; margin: 15px auto 0; padding: 20px; background: var(--bg-card);
            border-radius: 15px; box-shadow: var(--shadow); border: 1px solid var(--input-border);
            position: relative; max-width: 380px; width: 90%; box-sizing: border-box;
        }
        .close-suggest { position: absolute; top: 5px; left: 10px; cursor: pointer; color: #ff4d4d; font-weight: bold; }
        .suggest-box { display: flex; gap: 8px; margin-top: 10px; }
        .suggest-input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--input-border); outline: none; background: var(--input-bg); color: var(--text-content); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>معاني الكلمات</h1>
        <button onclick="toggleTheme()" id="themeBtn">الوضع المظلم</button>
    </div>

    <div class="search-container">
        <input type="text" id="wordInput" placeholder="أكتب كلمة..." autocomplete="off" onkeydown="if(event.key==='Enter') handleSearch()">
        <button id="searchBtn" onclick="handleSearch()">بحث</button>
    </div>

    <div id="loader" class="loader-wrapper">
        <div class="dad-loader">ض</div>
    </div>

    <div id="resultArea" style="width: 100%;"></div>
</div>

<div class="footer-suggest" id="footerArea">
    <span class="suggest-link" id="toggleLink" onclick="showSuggest()">هل لديك كلمة جديدة؟</span>
    <div class="hidden-panel" id="suggestPanel">
        <span class="close-suggest" onclick="hideSuggest()">✕</span>
        <div class="suggest-box">
            <input type="text" id="newWordInput" class="suggest-input" placeholder="اكتب الكلمة هنا...">
            <button onclick="sendNewWord()" style="background: #3b82f6; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;">إرسال</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwRF6ZycN-hWpqWu2LW3LaU3Bgf7mQhJeORX6xKiXJ0EKInKU6weTgfZYrANBDt6Lnc/exec";

    function applySavedTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeBtn').innerText = savedTheme === 'dark' ? "الوضع النهاري" : "الوضع المظلم";
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        document.getElementById('themeBtn').innerText = newTheme === 'dark' ? "الوضع النهاري" : "الوضع المظلم";
    }

    function showSuggest() {
        document.getElementById('toggleLink').style.display = 'none';
        document.getElementById('suggestPanel').style.display = 'block';
    }

    function hideSuggest() {
        document.getElementById('toggleLink').style.display = 'inline';
        document.getElementById('suggestPanel').style.display = 'none';
    }

    async function handleSearch() {
        const input = document.getElementById('wordInput');
        const resArea = document.getElementById('resultArea');
        const loader = document.getElementById('loader');
        const query = input.value.trim();

        if (!query) return;
        resArea.innerHTML = '';
        loader.style.display = 'block';

        try {
            const res = await fetch(`${API_URL}?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            loader.style.display = 'none';
            if (data.found) {
                resArea.innerHTML = `<div class="result-card"><h2>${data.word}</h2><span class="label">الجملة الأولى:</span><span class="content">${data.sentence1}</span><span class="label">الجملة الثانية:</span><span class="content">${data.sentence2}</span></div>`;
            } else {
                resArea.innerHTML = '<p style="text-align:center; opacity:0.6;">الكلمة غير موجودة.</p>';
            }
        } catch (e) {
            loader.style.display = 'none';
            resArea.innerHTML = '<p style="color:red; text-align:center;">خطأ في الاتصال.</p>';
        }
    }

    async function sendNewWord() {
        const word = document.getElementById('newWordInput').value.trim();
        if (!word) return;
        document.getElementById('footerArea').innerHTML = '<div style="color: var(--text-labels); font-weight: bold; padding-bottom: 20px;">تم الاستلام، شكراً لك! ❤️</div>';
    }

    applySavedTheme();
</script>
</body>
</html>
